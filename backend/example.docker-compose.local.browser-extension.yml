services:
  backend:
    environment:
      - TRANSCRIPTION_PROVIDER=browser_extension
      - AUTH_PROVIDER=none
      - TRANSCRIPTION_STT_API_KEY=${TRANSCRIPTION_STT_API_KEY}
      - TRANSCRIPTION_STT_URL=${TRANSCRIPTION_STT_URL:-https://transcription.vexa.ai/v1/audio/transcriptions}
      - TRANSCRIPTION_STT_MODEL=${TRANSCRIPTION_STT_MODEL:-whisper-1}
      - TRANSCRIPTION_CHUNK_DURATION_MS=${TRANSCRIPTION_CHUNK_DURATION_MS:-5000}
      - TRANSCRIPTION_STT_LANGUAGE=${TRANSCRIPTION_STT_LANGUAGE:-}
