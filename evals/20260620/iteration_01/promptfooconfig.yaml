# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "DNA - Notes Generation Eval (iteration_01)"

# ── Provider is set via PROVIDER in your .env file (copy from .env.example). ─
metadata:
  provider: &provider "anthropic:messages:claude-opus-4-6"

prompts:
  - file://prompts/notes_v1.txt
  - file://prompts/notes_v2.txt
  - file://prompts/notes_v3.txt
  - file://prompts/notes_v4.txt
  - file://prompts/notes_v5.txt

providers:
  - *provider

defaultTest:
  vars:
    notes: ""
    glossary_global: file://../dataset/glossary_global.yaml
    glossary_project: file://../dataset/glossary_project.yaml
  assert:
    # ── Hard string exclusions ────────────────────────────────────────────────
    - type: not-contains
      value: "Let me know"
    - type: not-contains
      value: "Keep me posted"
    - type: not-contains
      value: "Keep me up to date"
    - type: not-contains
      value: "Feel free to"
    - type: not-contains
      value: "This appears to be"
    - type: not-contains
      value: "I think this is"
    - type: not-contains
      value: "I believe"
    - type: not-contains
      value: "Please note"

    # ── LLM rubric (global) ───────────────────────────────────────────────────
    - type: llm-rubric
      value: |
        The output must satisfy ALL of the following:
        1. Notes are formatted as a bullet point list — every note starts with "- "
        2. When the transcript includes supervisor approvals (e.g. "that's looking good", "happy with that",
           "yep, all good"), those appear as positive bullets — approvals are NOT dropped in favor of only
           listing change requests. The artist must know what is signed off as well as what to fix.
        3. Feedback is specific and grounded in the transcript — no vague filler, no invented details
        4. No soft requests ("let me know", "keep me posted", "feel free to reach out", etc.)
        5. No meta-commentary or self-reference ("this appears to be...", "I think this is...", "I believe...")
        6. No emojis
        7. Language is direct and terse — conversational hedges ("can we just", "if possible",
           "I think we can") are stripped; the underlying action or observation is stated plainly
        8. No artist names, department names, or job titles appear inside the bullet text
      provider: *provider

tests:
  # ── TST_010_0010 ── Comp, blown-out sky and desert dust ──────────────────
  - description: "TST_010_0010 — Comp, blown-out sky and desert dust"
    vars:
      transcript: file://../dataset/transcripts/TST_010_0010.txt
      context: |
        Version: TST_010_0010_TD
        Shot: TST_010_0010
        Task: Compositing
        Department: Comp
        Status: rev
        Description: Wide shot of desert sailing vessel with sky and mountain background
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_010_0010_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "sky"
          - "flare"
          - "Carryall"
          - "sand"
      # Mountains were explicitly approved — the model must not drop this
      - type: llm-rubric
        value: |
          The output must include a note stating that the mountains or scenery are acceptable/approved.
          The supervisor explicitly said "Yep, all good there" about the mountains and scenery.
        provider: *provider

  # ── TST_010_0020 ── Anim/Lookdev, digi-doubles and throne highlights ──────
  - description: "TST_010_0020 — Anim/Lookdev, digi-doubles movement and throne highlights"
    vars:
      transcript: file://../dataset/transcripts/TST_010_0020.txt
      context: |
        Version: TST_010_0020_TD
        Shot: TST_010_0020
        Task: Animation
        Department: Animation
        Status: rev
        Description: Interior throne room shot with digi-double characters
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_010_0020_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "throne"
          - "digi"
          - "walk"
      # Visibility/surroundings were called out as on the right track — must appear
      - type: llm-rubric
        value: |
          The output must include a note about the visibility of surroundings being good or on the right
          track — the supervisor confirmed they want to see surroundings but not the edges of the room,
          and said "you're on the right track".
        provider: *provider

  # ── TST_010_0030 ── Comp/FX, foreground tree and fire bloom ──────────────
  - description: "TST_010_0030 — Comp/FX, foreground tree removal and fire bloom"
    vars:
      transcript: file://../dataset/transcripts/TST_010_0030.txt
      context: |
        Version: TST_010_0030_TD
        Shot: TST_010_0030
        Task: Compositing
        Department: Comp
        Status: rev
        Description: Exterior shot with prisoners, foreground trees, and fire/smoke FX
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_010_0030_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "tree"
          - "smoke"
          - "prisoners"
      # Background trees and the guard were both approved — must not be dropped
      - type: llm-rubric
        value: |
          The output must include notes confirming that (a) the background trees are acceptable and
          (b) the guard with the helmet on screen left at the end is approved. Both were explicitly
          signed off by the supervisor.
        provider: *provider

  # ── TST_010_0040 ── Camera, rack focus to Ornithopter ────────────────────
  - description: "TST_010_0040 — Camera, rack focus to Ornithopter over Harvester"
    vars:
      transcript: file://../dataset/transcripts/TST_010_0040.txt
      context: |
        Version: TST_010_0040_TD
        Shot: TST_010_0040
        Task: Camera
        Department: Camera
        Status: rev
        Description: Wide shot of Harvester with Ornithopter entering frame
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_010_0040_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "rack focus"
          - "blades"
          - "10 frames"
      # Harvester shadow and blade movement were both approved — must appear
      - type: llm-rubric
        value: |
          The output must include positive notes for (a) the Harvester shadow being approved and
          (b) the Ornithopter blade movement and trajectory being approved. The supervisor explicitly
          confirmed both. The rack focus timing spec (10 frames max) must also appear.
        provider: *provider

  # ── TST_020_0010 ── Lighting, bulb glow approved ─────────────────────────
  - description: "TST_020_0010 — Lighting, bulb glow approved for tech check"
    vars:
      transcript: file://../dataset/transcripts/TST_020_0010.txt
      context: |
        Version: TST_020_0010_TD
        Shot: TST_020_0010
        Task: Lighting
        Department: Light
        Status: rev
        Description: Close shot with practical bulb glow lighting element
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_020_0010_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "tech check"
      # Short transcript — model must not hallucinate detail that isn't there
      - type: llm-rubric
        value: |
          The transcript is very short — the supervisor approved the shot and it is going to tech check.
          The output should be a single concise note about this status. It must NOT add invented details
          about the bulb glow, movement, or any other element not explicitly described in the transcript.
        provider: *provider

  # ── TST_020_0020 ── Comp, desert contrast and haze ───────────────────────
  - description: "TST_020_0020 — Comp, desert contrast and haze adjustment"
    vars:
      transcript: file://../dataset/transcripts/TST_020_0020.txt
      context: |
        Version: TST_020_0020_TD
        Shot: TST_020_0020
        Task: Compositing
        Department: Comp
        Status: rev
        Description: Desert sunset shot with dunes and atmospheric haze
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_020_0020_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "haze"
          - "dunes"
          - "contrast"
      # The creative direction about "beautiful sunset / less apocalyptic" must survive
      - type: llm-rubric
        value: |
          The output must capture the supervisor's creative direction that the shot should look more like
          a beautiful sunset and less apocalyptic. This specific creative framing was given alongside the
          haze and contrast notes and must not be lost.
        provider: *provider

  # ── TST_020_0030 ── FX/Comp, smoke plumes and cruiser reposition ──────────
  - description: "TST_020_0030 — FX/Comp, smoke plumes approved and cruiser reposition"
    vars:
      transcript: file://../dataset/transcripts/TST_020_0030.txt
      context: |
        Version: TST_020_0030_TD
        Shot: TST_020_0030
        Task: FX
        Department: FX
        Status: rev
        Description: Wide fleet shot with smoke plumes and cruiser among smaller ships
    assert:
      - type: factuality
        value: file://../dataset/notes/TST_020_0030_ref.txt
        provider: *provider
      - type: icontains-all
        value:
          - "cruiser"
          - "smoke"
          - "left"
      # Smoke plumes were approved — the positive note must appear
      - type: llm-rubric
        value: |
          The output must include a positive note that the smoke plumes are approved/looking good.
          The supervisor explicitly said the client loved the smoke plumes. This approval must appear
          as a note alongside the cruiser repositioning action item.
        provider: *provider
