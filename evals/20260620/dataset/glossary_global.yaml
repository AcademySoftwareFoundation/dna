# Global VFX production glossary — industry-wide terms and shorthand.

SR: Screen right — the right side of frame from the camera's point of view.
SL: Screen left — the left side of frame from the camera's point of view.
bumping: to snag on or object to a specific element of the work — feeling it isn't right and being unable to move past it (e.g. "the client's bumping on the color").
comp: Compositing — combining multiple visual elements (CG, plates, FX) into a final image.
WIP: Work in progress — not yet at a reviewable or deliverable state.
tech check: Final technical quality review before a shot is delivered to the client or next department.
rack focus: Camera technique where focus shifts from one subject to another within a single take.
bloom: Light bleed or glow that spreads beyond a bright area; often applied to fire, practical lights, or lens elements.
digi-doubles: CG replicas of actors, used when a real performer cannot safely or practically be on set.
rev: In review — submitted for supervisor or client feedback.
BG: Background — elements behind the main subject in a shot.
FG: Foreground — elements in front of the main subject in a shot.
infinity feeling: The sense that a background extends endlessly with no visible boundary or edge.
