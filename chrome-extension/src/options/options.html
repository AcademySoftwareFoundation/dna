<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DNA Transcription Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 24px;
        max-width: 640px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input {
        width: 100%;
        margin-top: 4px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        padding: 8px 12px;
      }
      #message {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>DNA Transcription Settings</h1>
    <form id="configForm">
      <label for="dnaBackendUrl">DNA backend URL</label>
      <input id="dnaBackendUrl" name="dnaBackendUrl" required />

      <label for="dnaAuthToken">DNA auth token</label>
      <input id="dnaAuthToken" name="dnaAuthToken" required />

      <label for="sttUrl">STT URL</label>
      <input id="sttUrl" name="sttUrl" required />

      <label for="sttApiKey">STT API key</label>
      <input id="sttApiKey" name="sttApiKey" required />

      <label for="sttModel">STT model</label>
      <input id="sttModel" name="sttModel" required />

      <label for="chunkDurationMs">Chunk duration (ms)</label>
      <input id="chunkDurationMs" name="chunkDurationMs" type="number" required />

      <label for="language">Language</label>
      <input id="language" name="language" />

      <button type="submit">Save</button>
    </form>
    <p id="message"></p>
    <script type="module" src="./options.js"></script>
  </body>
</html>
